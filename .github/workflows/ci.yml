name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build Swift package
        run: swift build

      - name: Run Swift smoke checks
        run: swift run SetaMacChecks

      - name: Install scanner dependencies
        run: python -m pip install -r Scanner/requirements.txt

      - name: Run Python scanner tests
        run: PYTHONPATH=Scanner python -m unittest discover -s Scanner/tests -v
